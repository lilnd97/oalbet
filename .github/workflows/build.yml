name: Build APK (Capacitor)

on:
  push:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Lấy source code
      - name: Checkout
        uses: actions/checkout@v4

      # ⚙️ Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 📦 Cài dependencies
      - name: Install dependencies
        run: npm install

      # 🏗 Build web (ra dist/)
      - name: Build web
        run: npm run build

      # ⚡ Cài Capacitor CLI (nếu chưa có)
      - name: Ensure Capacitor
        run: npm install @capacitor/core @capacitor/cli

      # 🔍 Debug nhẹ (giúp bạn nếu lỗi)
      - name: Check project structure
        run: |
          ls -la
          echo "---- dist ----"
          ls -la dist || true

      # 📱 Add Android (nếu chưa có)
      - name: Add Android
        run: npx cap add android

      # 🔄 Sync code vào Android
      - name: Sync Capacitor
        run: npx cap sync android

      # ☕ Setup Java (bắt buộc cho Gradle)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # 🚀 Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 📤 Upload file APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

